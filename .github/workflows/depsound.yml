# depsound reviews its own dependency-update PRs (go.mod bumps and
# github-actions uses: bumps), dogfooding depsound-action. One workflow, two
# jobs; the security-model notes live in depsound-action's examples/.
name: depsound
on:
  pull_request_target:

permissions: {} # scopes are granted per job below

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read # diff the PR's manifests; this job never sees a write token
    steps:
      - uses: rvagg/depsound-action@62d36b20c05c02747031abf815124d76944d9403 # v0.3.1
  post:
    needs: review
    if: ${{ always() && needs.review.result != 'cancelled' }} # a failed review still posts its failure marker
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # upsert the sticky comment
      checks: write        # set the neutral check
      actions: read        # download the report artifact
    steps:
      - uses: rvagg/depsound-action/post@62d36b20c05c02747031abf815124d76944d9403 # v0.3.1
