# depsound reviews its own dependency-update PRs (go.mod bumps and github-actions
# uses: bumps), dogfooding depsound-action. The COMPUTE half: on every PR it
# diffs the changed manifests, runs depsound, and uploads the report as an
# artifact. Paired with depsound-post.yml.
name: depsound
on:
  pull_request:

permissions:
  contents: read # checkout + diff the PR's manifests; no write, never posts

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: rvagg/depsound-action@d86adc19cac7e91855d5d9ee7e3b6462de306c54 # v0.2.6
