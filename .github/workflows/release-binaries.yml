name: GoReleaser

# Triggers ONLY on a published release (the unified Releaser publishes it after
# a version.json bump) and manual dispatch. NOT on workflow_run: that fired
# goreleaser on the default branch with no tag, so `release --clean` failed.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write     # sigstore identity for the build-provenance attestation
  attestations: write # store the attestation against the repo

jobs:
  bin-releaser:
    name: Release Binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: Release Binaries
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Attest build provenance
        # checksums.txt ships with the release, so it cannot vouch for it.
        # This attestation is stored independently; consumers (including
        # depsound-action) verify downloads with `gh attestation verify`.
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
