name: GoReleaser

# Triggers ONLY on a published release (the unified Releaser publishes it after
# a version.json bump) and manual dispatch. NOT on workflow_run: that fired
# goreleaser on the default branch with no tag, so `release --clean` failed.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bin-releaser:
    name: Release Binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: Release Binaries
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
