name: GoReleaser

# Triggers ONLY on a published release (the unified Releaser publishes it after
# a version.json bump) and manual dispatch. NOT on workflow_run: that fired
# goreleaser on the default branch with no tag, so `release --clean` failed.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bin-releaser:
    name: Release Binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Release Binaries
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
